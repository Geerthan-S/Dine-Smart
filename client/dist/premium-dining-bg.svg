<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.42" stop-color="#111827"/>
      <stop offset="1" stop-color="#07151b"/>
    </linearGradient>
    <radialGradient id="tableGlow" cx="50%" cy="70%" r="44%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.34"/>
      <stop offset="0.36" stop-color="#fb923c" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="windowGlow" cx="78%" cy="18%" r="46%">
      <stop offset="0" stop-color="#FFC76A" stop-opacity="0.18"/>
      <stop offset="0.44" stop-color="#8F6422" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wineGlow" cx="24%" cy="24%" r="38%">
      <stop offset="0" stop-color="#FFB547" stop-opacity="0.20"/>
      <stop offset="0.45" stop-color="#5E431C" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1800" height="1200" fill="url(#room)"/>
  <rect width="1800" height="1200" fill="url(#windowGlow)"/>
  <rect width="1800" height="1200" fill="url(#wineGlow)"/>
  <rect width="1800" height="1200" fill="url(#tableGlow)"/>

  <g filter="url(#softBlur)" opacity="0.58">
    <ellipse cx="900" cy="880" rx="620" ry="180" fill="#f97316" opacity="0.18"/>
    <ellipse cx="1280" cy="290" rx="460" ry="220" fill="#FFC76A" opacity="0.10"/>
    <ellipse cx="410" cy="340" rx="420" ry="220" fill="#8F6422" opacity="0.16"/>
  </g>

  <g opacity="0.18">
    <path d="M0 760 C360 670 520 775 880 698 C1210 628 1460 660 1800 560 L1800 1200 L0 1200 Z" fill="#020617"/>
    <path d="M0 820 C340 760 620 840 940 770 C1240 704 1480 730 1800 650" fill="none" stroke="#f8fafc" stroke-opacity="0.16" stroke-width="2"/>
  </g>

  <g opacity="0.22">
    <rect x="1160" y="120" width="360" height="420" rx="28" fill="#e0f2fe" opacity="0.08"/>
    <rect x="1198" y="160" width="120" height="340" rx="18" fill="#ffffff" opacity="0.05"/>
    <rect x="1350" y="160" width="120" height="340" rx="18" fill="#ffffff" opacity="0.045"/>
  </g>

  <g opacity="0.18" filter="url(#softBlur)">
    <circle cx="745" cy="728" r="42" fill="#fff7ed"/>
    <circle cx="930" cy="714" r="54" fill="#fde68a"/>
    <circle cx="1062" cy="742" r="36" fill="#FFD58C"/>
  </g>

  <rect width="1800" height="1200" filter="url(#grain)" opacity="0.36"/>
  <rect width="1800" height="1200" fill="#020617" opacity="0.08"/>
</svg>
